name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  # What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
#      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
#      - 'bugfix'
#      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'refactor'

#version-resolver:
#  major:
#    labels:
#      - 'type: breaking'
#  minor:
#    labels:
#      - 'type: feature'
#  patch:
#    labels:
#      - 'type: bug'
#      - 'type: maintenance'
#      - 'type: docs'
#      - 'type: dependencies'
#      - 'type: security'

exclude-labels:
  - 'skip-changelog'
