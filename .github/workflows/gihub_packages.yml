name: CD
on:
  repository_dispatch:
    types: [ deploy ]

  push:
    branches:
      - 'main'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v2
        with:
          ref: main

      - name: Secrets to File
        uses: timheuer/base64-to-file@v1.1
        with:
          fileName: 'private.tar'
          fileDir: './'
          encodedString: ${{ secrets.PRIVATE_BASE64 }}

      - name: Extract private.tar
        run: |
          tar xzvf ./private.tar
          rm private.tar

      - name: build
        run: |
          ./gradlew :designsystem:build

      - name: publish
        run: |
          ./gradlew :designsystem:publishDeployPublicationToGithubPackagesRepository