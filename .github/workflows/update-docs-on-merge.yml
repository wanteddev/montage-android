name: Update Design System Docs on Merge

# 이 워크플로우의 트리거 조건
on:
  push:
    branches:
      - 'main'        # main 브랜치에 push(merge)될 때 실행

jobs:
  # 디자인 시스템 문서 업데이트 Job
  update_ds_docs:
    name: Update and Commit Design System Docs
    runs-on: self-hosted
    timeout-minutes: 30

    # 중요: 무한 루프 방지
    # 봇이 커밋한 메시지에 'docs:'가 포함되어 있으면 이 Job을 실행하지 않습니다.
    if: "contains(github.event.head_commit.message, 'docs:') == false"

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Read Versions from Properties
        id: versions
        run: |
          VERSION=$(grep '^version=' library/publish.properties | cut -d'=' -f2)
          BEFORE_VERSION=$(grep '^beforeVersion=' library/publish.properties | cut -d'=' -f2)
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BEFORE_VERSION=$BEFORE_VERSION" >> $GITHUB_ENV
          
          if [ "$(printf '%s\n' "$BEFORE_VERSION" "$VERSION" | sort -V | head -n1)" != "$VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.versions.outputs.version_changed == 'true'
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.WANTED_DEV_TOKEN }}
          fetch-depth: 0
          clean: false

      - name: Update Design System Document
        if: steps.versions.outputs.version_changed == 'true'
        run: |
          ./gradlew \
            :library:extractDesignSystemJavadocToMd \
            :library:mergeDesignSystemJavadocByPackage
          sleep 1

      - name: Update DS Document mdx
        if: steps.versions.outputs.version_changed == 'true'
        run: |
          echo "📂 변경된 DS 문서 파일을 처리합니다..."
          # 변경된 source 파일만 추출
          CHANGED_FILES=$(git status --porcelain | awk '{print $2}' | grep '^library/document/source/' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "✅ 변경된 문서 없음. 스킵."
            exit 0
          fi
          
          # md 디렉토리 없으면 생성
          mkdir -p library/document/md
          
          for file in $CHANGED_FILES; do
            # 빈 파일이면 스킵
            if [ ! -s "$file" ]; then
              echo "⚠️ 빈 파일 (스킵): $file"
              continue
            fi
          
            echo "🔄 파일 처리 중: $file"
          
            # 파일 내용을 JSON-safe한 문자열로 변환
            ENCODED_CONTENT=$(jq -Rs . < "$file")
          
            # Lass API 요청
            RESPONSE=$(curl --silent --fail --show-error \
              --location 'https://api-laas.wanted.co.kr/api/preset/v2/chat/completions' \
              --header "project: ${{ secrets.LASS_DS_DOCUMENT_PROJECT }}" \
              --header "apiKey: ${{ secrets.LASS_DS_DOCUMENT_API_KEY }}" \
              --header "Content-Type: application/json" \
              --data "{
                \"hash\": \"${{ secrets.LASS_DS_DOCUMENT_HASH }}\",
                \"params\": {
                  \"javadoc_source\": $ENCODED_CONTENT
                }
              }"
            )
          
            if [ $? -ne 0 ]; then
              echo "❌ Lass API 호출 실패: $file"
              exit 1
            fi
          
            # Lass 응답에서 변환된 텍스트 추출
            MD_CONTENT=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['choices'][0]['message']['content'])")
          
            # 출력 파일 경로 구성
            BASENAME=$(basename "$file")               # ex: Button.md
            OUT_NAME="${BASENAME%.*}.mdx"              # 확장자 변경
            OUT_PATH="library/document/md/$OUT_NAME"
          
            echo "💾 변환 결과 저장: $OUT_PATH"
            echo "$MD_CONTENT" > "$OUT_PATH"
          
            sleep 1 # 요청 사이 딜레이
          done

      - name: Update beforeVersion to match version
        if: steps.versions.outputs.version_changed == 'true'
        run: |
          # 크로스 플랫폼 호환 방식
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/^beforeVersion=.*/beforeVersion=${VERSION}/" library/publish.properties
          else
            sed -i "s/^beforeVersion=.*/beforeVersion=${VERSION}/" library/publish.properties
          fi

      - name: Commit & Push Design System Docs
        if: steps.versions.outputs.version_changed == 'true'
        run: |
          git config --local user.name "deploy-bot"
          
          # 변경된 source 및 md 스테이징
          git add library/document/source
          git add library/document/md
          git add library/publish.properties
          
          if git diff --cached --quiet; then
            echo "No doc changes to commit"
            exit 0
          fi

          # 커밋 메시지에 'docs:'를 포함시켜 무한 루프를 방지합니다.
          git commit -m "docs: update Design System documentation and mdx"
          git push
